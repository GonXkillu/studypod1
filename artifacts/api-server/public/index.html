<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyPod Scheduler — Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📚 StudyPod Scheduler</h1>
      <p>Reserve your study space online, anytime.</p>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
      <button class="tab-btn" onclick="showTab('register')">Create Account</button>
    </div>

    <div id="msg" class="alert"></div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email address</label>
        <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
      <p class="text-muted mt-1" style="text-align:center;font-size:.8rem;">
        Demo admin: <strong>admin@studypod.com</strong> / <strong>admin123!</strong>
      </p>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="regName">Full name</label>
        <input id="regName" type="text" class="form-control" placeholder="Your full name" required minlength="2" />
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email address</label>
        <input id="regEmail" type="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <input id="regPassword" type="password" class="form-control" placeholder="At least 8 characters" required minlength="8" />
        <span class="form-text">Password must be at least 8 characters.</span>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Create Account</button>
    </form>
  </div>
</div>

<script>
  (async () => {
    const res = await fetch('/api/auth/me');
    if (res.ok) window.location.href = '/dashboard';
  })();

  function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'alert' + (text ? ' show alert-' + type : '');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    showMsg('', '');
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Login failed', 'error'); return; }
      window.location.href = '/dashboard';
    } catch { showMsg('Network error. Please try again.', 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Sign In'; }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    btn.disabled = true; btn.textContent = 'Creating account…';
    showMsg('', '');
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showMsg(data.error || 'Registration failed', 'error'); return; }
      window.location.href = '/dashboard';
    } catch { showMsg('Network error. Please try again.', 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Create Account'; }
  }
</script>
</body>
</html>
